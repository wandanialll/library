name: CD Self-Hosted

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy (for example v1.2.0)
        required: true
        type: string

jobs:
  deploy:
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != '' }}
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e

            REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
            RELEASE_TAG="${{ inputs.release_tag }}"
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

            if [ -z "$RELEASE_TAG" ]; then
              echo "release_tag input is required"
              exit 1
            fi

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              mkdir -p "$DEPLOY_PATH"
              git clone "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch --all --prune --tags

            if ! git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
              echo "Tag '$RELEASE_TAG' not found in repository"
              exit 1
            fi

            git checkout --detach "refs/tags/$RELEASE_TAG"

            if [ ! -f .env ]; then
              echo ".env is missing at $DEPLOY_PATH/.env. Create it before deploying."
              exit 1
            fi

            docker compose --env-file .env -f infra/docker-compose.app.yml up -d --build

            docker compose --env-file .env -f infra/docker-compose.app.yml exec -T api node dist/scripts/migrate-json-to-db.js || true
